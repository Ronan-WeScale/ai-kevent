name: Deploy docs

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "mkdocs.yml"

  workflow_dispatch:

jobs:
  deploy:
    name: Build & deploy MkDocs
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for git-revision-date plugin

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install MkDocs + Material
        run: |
          pip install \
            mkdocs-material==9.6.* \
            mkdocs==1.6.*

      - name: Build site
        run: mkdocs build --strict

      - name: Deploy to gh-pages (preserve Helm chart files)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stash the built site
          cp -r site /tmp/mkdocs-site

          # Checkout gh-pages and preserve Helm artefacts
          git fetch origin gh-pages
          git checkout gh-pages

          # Save Helm index and chart packages
          mkdir -p /tmp/helm-preserve
          [ -f index.yaml ] && cp index.yaml /tmp/helm-preserve/
          for f in *.tgz; do [ -f "$f" ] && cp "$f" /tmp/helm-preserve/; done

          # Wipe and replace with built site
          git rm -rf . --quiet || true

          cp -r /tmp/mkdocs-site/. .

          # Restore Helm artefacts
          [ -f /tmp/helm-preserve/index.yaml ] && cp /tmp/helm-preserve/index.yaml .
          for f in /tmp/helm-preserve/*.tgz; do [ -f "$f" ] && cp "$f" .; done

          git add .
          git diff --cached --quiet || git commit -m "docs: deploy MkDocs site from ${GITHUB_SHA::8}"
          git push origin gh-pages
