name: Deploy — dev (hors-prod)

# Triggered on every push to develop (and release/* for final RC validation).
# Builds and pushes :dev / :rc-<sha> images to ghcr.io so the hors-prod
# environment always tracks the latest integrated code.

on:
  push:
    branches:
      - develop
      - "release/**"

env:
  GATEWAY_IMAGE: ghcr.io/${{ github.repository_owner }}/kevent-ai/gateway
  RELAY_IMAGE:   ghcr.io/${{ github.repository_owner }}/kevent-ai/relay

jobs:
  # ── Determine image tag ────────────────────────────────────────────────────
  meta:
    name: Compute image tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Compute tag
        id: tag
        run: |
          SHA="${GITHUB_SHA::7}"
          if [[ "$GITHUB_REF_NAME" == release/* ]]; then
            echo "tag=rc-${SHA}" >> $GITHUB_OUTPUT
          else
            echo "tag=dev" >> $GITHUB_OUTPUT
          fi

  # ── Gateway dev image ──────────────────────────────────────────────────────
  gateway:
    name: Gateway — build & push :${{ needs.meta.outputs.tag }}
    runs-on: ubuntu-latest
    needs: meta
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.GATEWAY_IMAGE }}:${{ needs.meta.outputs.tag }}
          build-args: |
            VERSION=${{ needs.meta.outputs.tag }}-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Relay dev image ────────────────────────────────────────────────────────
  relay:
    name: Relay — build & push :${{ needs.meta.outputs.tag }}
    runs-on: ubuntu-latest
    needs: meta
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: relay
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.RELAY_IMAGE }}:${{ needs.meta.outputs.tag }}
          build-args: |
            VERSION=${{ needs.meta.outputs.tag }}-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
