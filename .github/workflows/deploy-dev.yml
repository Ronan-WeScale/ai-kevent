name: Deploy — dev (hors-prod)

# Triggered on pushes to develop / release/* that touch gateway or relay
# source files. Pure docs, CI, or Helm changes do not trigger a build.

on:
  push:
    branches:
      - develop
      - "release/**"
    paths:
      # Gateway module
      - "cmd/**"
      - "internal/**"
      - "Dockerfile"
      - "go.mod"
      - "go.sum"
      # Relay module
      - "relay/**"

jobs:
  # ── Detect which module(s) changed ─────────────────────────────────────────
  changes:
    name: Detect changed modules
    runs-on: ubuntu-latest
    outputs:
      gateway: ${{ steps.filter.outputs.gateway }}
      relay:   ${{ steps.filter.outputs.relay }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            gateway:
              - "cmd/**"
              - "internal/**"
              - "Dockerfile"
              - "go.mod"
              - "go.sum"
            relay:
              - "relay/**"

  # ── Compute tag + lowercase image names ────────────────────────────────────
  meta:
    name: Compute image tag
    runs-on: actions-runner-controller
    needs: changes
    outputs:
      tag:           ${{ steps.tag.outputs.tag }}
      gateway_image: ${{ steps.images.outputs.gateway }}
      relay_image:   ${{ steps.images.outputs.relay }}
    steps:
      - name: Compute tag
        id: tag
        run: |
          SHA="${GITHUB_SHA::7}"
          if [[ "$GITHUB_REF_NAME" == release/* ]]; then
            echo "tag=rc-${SHA}" >> $GITHUB_OUTPUT
          else
            echo "tag=dev" >> $GITHUB_OUTPUT
          fi

      - name: Compute lowercase image names
        id: images
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "gateway=ghcr.io/${OWNER}/kevent-ai/gateway" >> $GITHUB_OUTPUT
          echo "relay=ghcr.io/${OWNER}/kevent-ai/relay"    >> $GITHUB_OUTPUT

  # ── Gateway dev image ──────────────────────────────────────────────────────
  gateway:
    name: Gateway — build & push :${{ needs.meta.outputs.tag }}
    runs-on: actions-runner-controller
    needs: [meta, changes]
    if: needs.changes.outputs.gateway == 'true'
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ needs.meta.outputs.gateway_image }}:${{ needs.meta.outputs.tag }}
          build-args: VERSION=${{ needs.meta.outputs.tag }}-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Relay dev image ────────────────────────────────────────────────────────
  relay:
    name: Relay — build & push :${{ needs.meta.outputs.tag }}
    runs-on: actions-runner-controller
    needs: [meta, changes]
    if: needs.changes.outputs.relay == 'true'
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: relay
          platforms: linux/amd64
          push: true
          tags: ${{ needs.meta.outputs.relay_image }}:${{ needs.meta.outputs.tag }}
          build-args: VERSION=${{ needs.meta.outputs.tag }}-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
