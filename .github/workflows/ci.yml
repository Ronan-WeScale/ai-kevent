name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test-gateway:
    name: Gateway — test & vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go vet ./...
      - run: go test -race -count=1 ./...

  test-relay:
    name: Relay — test & vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: relay/go.mod
          cache: true
          cache-dependency-path: relay/go.sum
      - working-directory: relay
        run: go vet ./...
      - working-directory: relay
        run: go test ./...

  lint-helm:
    name: Helm — lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - run: helm repo add dandydeveloper https://dandydeveloper.github.io/charts
      - run: helm dependency update ./helm/gateway
      - run: helm lint ./helm/gateway
