name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ── Detect which module(s) changed ─────────────────────────────────────────
  changes:
    name: Detect changed modules
    runs-on: actions-runner-controller
    outputs:
      gateway: ${{ steps.filter.outputs.gateway }}
      relay:   ${{ steps.filter.outputs.relay }}
      helm:    ${{ steps.filter.outputs.helm }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            gateway:
              - "cmd/**"
              - "internal/**"
              - "go.mod"
              - "go.sum"
            relay:
              - "relay/**"
            helm:
              - "helm/**"

  test-gateway:
    name: Gateway — test & vet
    runs-on: actions-runner-controller
    needs: changes
    if: needs.changes.outputs.gateway == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go vet ./...
      - run: go test -count=1 ./...

  test-relay:
    name: Relay — test & vet
    runs-on: actions-runner-controller
    needs: changes
    if: needs.changes.outputs.relay == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: relay/go.mod
          cache: true
          cache-dependency-path: relay/go.sum
      - working-directory: relay
        run: go vet ./...
      - working-directory: relay
        run: go test ./...

  lint-helm:
    name: Helm — lint
    runs-on: actions-runner-controller
    needs: changes
    if: needs.changes.outputs.helm == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - run: helm repo add dandydeveloper https://dandydeveloper.github.io/charts
      - run: helm dependency update ./helm/gateway
      - run: helm lint ./helm/gateway
