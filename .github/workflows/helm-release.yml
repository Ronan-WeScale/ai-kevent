name: Release — Helm chart

on:
  push:
    branches:
      - main
    paths:
      - "helm/**"
      - "docs/**"

jobs:
  release:
    name: Package & publish to GitHub Pages
    runs-on: ubuntu-latest
    permissions:
      contents: write   # push to gh-pages branch

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0    # chart-releaser needs full history to detect changes

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - uses: azure/setup-helm@v4

      - uses: helm/chart-releaser-action@v1.6.0
        with:
          charts_dir: helm
          skip_existing: true   # évite le 403 si la release existe déjà (ex: rerun)
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish docs to GitHub Pages
        run: |
          # Save docs/ before switching branches
          cp -r docs /tmp/kevent-docs

          # chart-releaser leaves .cr-index/ as an untracked directory; remove it
          # before switching branches to avoid "would be overwritten" errors.
          rm -rf .cr-index

          git fetch origin gh-pages
          git checkout gh-pages

          # Copy docs/ content to the root of gh-pages (preserves existing chart files)
          cp -r /tmp/kevent-docs/. .

          git add .
          git diff --cached --quiet || git commit -m "docs: update runbooks from main"
          git push origin gh-pages
