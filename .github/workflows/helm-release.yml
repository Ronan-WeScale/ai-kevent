name: Release — Helm chart

on:
  push:
    branches:
      - main
    paths:
      - "helm/**"

jobs:
  release:
    name: Package & publish to GitHub Pages
    runs-on: actions-runner-controller
    permissions:
      contents: write   # push to gh-pages branch

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0    # chart-releaser needs full history to detect changes

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - uses: azure/setup-helm@v4

      - uses: helm/chart-releaser-action@v1.6.0
        with:
          charts_dir: helm
          skip_existing: true   # évite le 403 si la release existe déjà (ex: rerun)
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up chart-releaser artefacts
        run: rm -rf .cr-index .cr-release-packages
