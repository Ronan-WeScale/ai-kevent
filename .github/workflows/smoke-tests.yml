name: Smoke tests — dev

# Triggered automatically after "Deploy — dev" succeeds (image pushed to :dev or :rc-<sha>).
# Also triggerable manually via workflow_dispatch for ad-hoc runs.
#
# Requires the following to be configured on the repository / environment:
#
#   Variables  (Settings → Environments → dev → Variables)
#     GATEWAY_URL        https://api.kevent-dev.example.com
#     AUDIO_URL          URL of a short speech audio file (.mp3 / .wav / .m4a)
#     GATEWAY_READY_TIMEOUT  seconds to wait for the gateway to be ready after deploy (default: 120)
#     WHISPER_MODEL      whisper-large-v3          (optional, this is the default)
#     RERANK_MODEL       bge-reranker-v2-m3        (optional, this is the default)
#     RERANK_ENDPOINT    /v1/rerank                (optional, this is the default)
#
#   Secrets    (Settings → Environments → dev → Secrets)
#     GATEWAY_API_KEY    API key forwarded as the 'apikey' header (leave empty if no auth)

on:
  # Primary trigger: runs as soon as the dev deploy finishes successfully.
  workflow_run:
    workflows: ["Deploy — dev (hors-prod)"]
    types: [completed]

  # Manual trigger: useful to re-run tests without a new deploy, or to test
  # a specific gateway URL / audio file.
  workflow_dispatch:
    inputs:
      gateway_url:
        description: "Gateway URL (overrides env var)"
        required: false
      audio_url:
        description: "Audio file URL (overrides env var)"
        required: false
      poll_timeout:
        description: "Max seconds to wait for async job"
        required: false
        default: "300"
      skip_whisper:
        description: "Skip Whisper tests (1 = skip)"
        required: false
        default: "0"
      skip_rerank:
        description: "Skip Rerank test (1 = skip)"
        required: false
        default: "0"

jobs:
  smoke:
    name: Smoke tests
    runs-on: ubuntu-latest
    environment: dev
    # Skip when triggered via workflow_run if the upstream deploy failed.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4
        # workflow_run provides the SHA of the triggering commit — check out
        # the same ref so smoke.sh matches the deployed code.
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Install jq
        run: sudo apt-get install -y --no-install-recommends jq

      # The deploy workflow pushes a new image and the cluster rolls out the pod.
      # Wait until GET /health returns 200 before running the functional tests.
      - name: Wait for gateway to be ready
        env:
          GATEWAY_URL:     ${{ inputs.gateway_url || vars.GATEWAY_URL }}
          GATEWAY_API_KEY: ${{ secrets.GATEWAY_API_KEY }}
          READY_TIMEOUT:   ${{ vars.GATEWAY_READY_TIMEOUT || '120' }}
        run: |
          AUTH_HEADER=""
          [[ -n "$GATEWAY_API_KEY" ]] && AUTH_HEADER="-H apikey:${GATEWAY_API_KEY}"

          echo "Waiting up to ${READY_TIMEOUT}s for ${GATEWAY_URL}/health ..."
          ELAPSED=0
          until [[ "$( curl -sf -o /dev/null -w "%{http_code}" \
                        $AUTH_HEADER \
                        --max-time 5 \
                        "${GATEWAY_URL}/health" 2>/dev/null )" == "200" ]]; do
            if [[ $ELAPSED -ge $READY_TIMEOUT ]]; then
              echo "::error::Gateway did not become healthy within ${READY_TIMEOUT}s"
              exit 1
            fi
            echo "  ... not ready yet (${ELAPSED}s elapsed)"
            sleep 5
            ELAPSED=$((ELAPSED + 5))
          done
          echo "Gateway is ready (${ELAPSED}s)"

      - name: Run smoke tests
        env:
          GATEWAY_URL:      ${{ inputs.gateway_url    || vars.GATEWAY_URL }}
          AUDIO_URL:        ${{ inputs.audio_url      || vars.AUDIO_URL }}
          GATEWAY_API_KEY:  ${{ secrets.GATEWAY_API_KEY }}
          WHISPER_MODEL:    ${{ vars.WHISPER_MODEL    || 'whisper-large-v3' }}
          RERANK_MODEL:     ${{ vars.RERANK_MODEL     || 'bge-reranker-v2-m3' }}
          RERANK_ENDPOINT:  ${{ vars.RERANK_ENDPOINT  || '/v1/rerank' }}
          POLL_TIMEOUT:     ${{ inputs.poll_timeout   || '300' }}
          SYNC_TIMEOUT:     "300"
          SKIP_WHISPER:     ${{ inputs.skip_whisper   || '0' }}
          SKIP_RERANK:      ${{ inputs.skip_rerank    || '0' }}
        run: bash tests/smoke/smoke.sh

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Smoke tests failed — check the gateway at ${GATEWAY_URL}"
