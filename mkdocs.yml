site_name: kevent-ai
site_description: AI inference job gateway for Kubernetes/Knative
site_url: https://ia-generative.github.io/kevent-ai/
repo_url: https://github.com/IA-Generative/kevent-ai
repo_name: IA-Generative/kevent-ai
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Architecture:
      - Overview: architecture/overview.md
      - Request flows: architecture/request-flows.md
      - Service registry: architecture/service-registry.md
      - Priority routing: architecture/priority.md
      - LLM proxy: architecture/llm-proxy.md
      - Rate limiting: architecture/rate-limiting.md
  - Deployment:
      - Helm chart: deployment/helm.md
      - Configuration reference: deployment/configuration.md
      - Kafka & SASL: deployment/kafka.md
  - Contributing:
      - Gitflow: contributing/gitflow.md
      - Releasing: contributing/releasing.md
  - Runbooks:
      - Gateway — High Error Rate: runbooks/KeventGatewayHighErrorRate.md
      - Gateway — Kafka Publish Errors: runbooks/KeventGatewayKafkaPublishErrors.md
      - Gateway — S3 Errors: runbooks/KeventGatewayS3Errors.md
      - Gateway — Sync Jobs In-Flight High: runbooks/KeventGatewaySyncJobsInFlightHigh.md
      - Gateway — Rate Limit High Rejection Rate: runbooks/KeventGatewayRateLimitHighRejectionRate.md
      - Gateway — Rate Limit Errors: runbooks/KeventGatewayRateLimitErrors.md
      - Relay — Inference Slow: runbooks/KeventRelayInferenceSlow.md
      - Relay — Job Failure Rate: runbooks/KeventRelayJobFailureRate.md
      - Relay — S3 Errors: runbooks/KeventRelayS3Errors.md
  - Changelog: changelog.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/IA-Generative/kevent-ai
