# Strimzi KafkaUser manifests for kevent-gateway and kevent-relay.
#
# Apply in the namespace where your Strimzi Kafka cluster is managed:
#   kubectl apply -f examples/kafka-users.yaml -n <kafka-namespace>
#
# Adjust the strimzi.io/cluster label to match your Kafka cluster name.
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaUser
metadata:
  name: kevent-gateway
  # namespace: <kafka-namespace>
  labels:
    strimzi.io/cluster: my-kafka  # replace with your Kafka cluster name
spec:
  authentication:
    type: scram-sha-512
  authorization:
    type: simple
    acls:
      # Publish to input topics and read results
      - resource: { type: topic, name: jobs., patternType: prefix }
        operations: [Write, Create, Describe, Read]
      # Consumer group for result consumers
      - resource: { type: group, name: kevent-gateway, patternType: prefix }
        operations: [Read]
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaUser
metadata:
  name: kevent-relay
  # namespace: <kafka-namespace>
  labels:
    strimzi.io/cluster: my-kafka  # replace with your Kafka cluster name
spec:
  authentication:
    type: scram-sha-512
  authorization:
    type: simple
    acls:
      # Consume input topics via KafkaSource
      - resource: { type: topic, name: jobs., patternType: prefix }
        operations: [Read, Describe]
      # Delete ACL on inference-* groups is required by the Knative controller
      # for ConsumerGroup finalization. Without it, KafkaSources will not clean up.
      - resource: { type: group, name: inference-, patternType: prefix }
        operations: [Read, Describe, Delete]
      # Publish result topics
      - resource: { type: topic, name: jobs., patternType: prefix }
        operations: [Write, Create, Describe]
