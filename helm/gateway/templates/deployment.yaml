apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kevent-gateway.fullname" . }}
  labels:
    {{- include "kevent-gateway.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "kevent-gateway.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kevent-gateway.selectorLabels" . | nindent 8 }}
      annotations:
        # checksum/config is only set when configReloader is disabled.
        # When configReloader is enabled, it hot-reloads the config via POST /-/reload
        # without restarting pods — adding the checksum would trigger a rolling restart
        # on every ConfigMap change, defeating the purpose of the reloader.
        {{- if and (not .Values.config.existingConfigMap) (not .Values.configReloader.enabled) }}
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- end }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: gateway
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: CONFIG_PATH
              value: /etc/kevent/config.yaml
            # Les credentials S3 sont injectés depuis le Secret et expansés
            # par os.Expand au démarrage (syntaxe ${VAR} dans config.yaml).
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "kevent-gateway.s3SecretName" . }}
                  key: S3_ACCESS_KEY
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "kevent-gateway.s3SecretName" . }}
                  key: S3_SECRET_KEY
            {{- if .Values.kafka.sasl.enabled }}
            - name: KAFKA_SASL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "kevent-gateway.kafkaSecretName" . }}
                  key: {{ default "KAFKA_SASL_PASSWORD" .Values.kafka.sasl.secretKey }}
            {{- end }}
            {{- if or .Values.encryption.key .Values.encryption.existingSecret }}
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "kevent-gateway.encryptionSecretName" . }}
                  key: ENCRYPTION_KEY
            {{- end }}
            {{- with .Values.extraEnvVars }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/kevent
              readOnly: true
            {{- if .Values.kafka.tls.enabled }}
            - name: kafka-tls
              mountPath: /etc/kafka-tls
              readOnly: true
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- if .Values.configReloader.enabled }}
        - name: config-reloader
          image: "{{ .Values.configReloader.image }}"
          args:
            - --volume-dir=/etc/kevent
            - --webhook-url=http://localhost:8080/-/reload
            - --web.listen-address=:{{ .Values.configReloader.listenPort }}
          volumeMounts:
            - name: config
              mountPath: /etc/kevent
              readOnly: true
        {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "kevent-gateway.configMapName" . }}
        {{- if .Values.kafka.tls.enabled }}
        - name: kafka-tls
          secret:
            secretName: {{ .Values.kafka.tls.existingCACertSecret }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
