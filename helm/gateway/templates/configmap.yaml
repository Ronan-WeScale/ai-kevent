apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kevent-gateway.fullname" . }}
  labels:
    {{- include "kevent-gateway.labels" . | nindent 4 }}
data:
  config.yaml: |
    server:
      addr: ":8080"
      # write_timeout: 0 — les requêtes sync peuvent durer plusieurs minutes ;
      # le timeout est géré par Knative timeoutSeconds côté InferenceService.
      write_timeout: 0s

    kafka:
      brokers:
        - "{{ .Values.kafka.brokers }}"
      consumer_group: "kevent-gateway"

    s3:
      endpoint:            "{{ .Values.s3.endpoint }}"
      region:              "{{ .Values.s3.region }}"
      access_key:          "${S3_ACCESS_KEY}"
      secret_key:          "${S3_SECRET_KEY}"
      bucket:              "{{ .Values.s3.bucket }}"
      presign_ttl_minutes: {{ .Values.s3.presignTTLMinutes }}

    redis:
      addr:         "{{ include "kevent-gateway.redisAddr" . }}"
      password:     ""
      db:           0
      job_ttl_hours: 72

    services:
    {{- range .Values.services }}
      - type:              {{ .type }}
        {{- if .model }}
        model:             {{ .model | quote }}
        {{- end }}
        {{- if .openaiPath }}
        openai_path:       {{ .openaiPath | quote }}
        {{- end }}
        {{- if .inferenceURL }}
        inference_url:     {{ .inferenceURL | quote }}
        {{- end }}
        input_topic:       {{ .inputTopic }}
        result_topic:      {{ .resultTopic }}
        accepted_exts:     {{ .acceptedExts | toJson }}
        max_file_size_mb:  {{ .maxFileSizeMB }}
    {{- end }}
