{{- if .Values.alerting.prometheusRule.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "kevent-gateway.fullname" . }}
  {{- if .Values.alerting.prometheusRule.namespace }}
  namespace: {{ .Values.alerting.prometheusRule.namespace }}
  {{- else }}
  namespace: {{ .Release.Namespace }}
  {{- end }}
  labels:
    {{- include "kevent-gateway.labels" . | nindent 4 }}
    {{- with .Values.alerting.prometheusRule.additionalLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  groups:
    - name: kevent-gateway
      rules:
        {{- $runbookBase := .Values.alerting.prometheusRule.runbookBaseURL }}

        - alert: KeventGatewayHighErrorRate
          expr: |
            (
              sum(rate(kevent_requests_total{status=~"5.."}[5m])) /
              sum(rate(kevent_requests_total[5m]))
            ) > {{ .Values.alerting.prometheusRule.thresholds.gatewayErrorRateWarning }}
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High gateway error rate ({{ "{{" }} $value | humanizePercentage {{ "}}" }})"
            description: "More than {{ mulf .Values.alerting.prometheusRule.thresholds.gatewayErrorRateWarning 100 }}% of gateway requests are returning 5xx errors."
            runbook_url: "{{ $runbookBase }}/KeventGatewayHighErrorRate"

        - alert: KeventGatewayHighErrorRate
          expr: |
            (
              sum(rate(kevent_requests_total{status=~"5.."}[5m])) /
              sum(rate(kevent_requests_total[5m]))
            ) > {{ .Values.alerting.prometheusRule.thresholds.gatewayErrorRateCritical }}
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Critical gateway error rate ({{ "{{" }} $value | humanizePercentage {{ "}}" }})"
            description: "More than {{ mulf .Values.alerting.prometheusRule.thresholds.gatewayErrorRateCritical 100 }}% of gateway requests are returning 5xx errors."
            runbook_url: "{{ $runbookBase }}/KeventGatewayHighErrorRate"

        - alert: KeventGatewayKafkaPublishErrors
          expr: sum(increase(kevent_kafka_publish_errors_total[5m])) > 0
          for: 0m
          labels:
            severity: critical
          annotations:
            summary: "Gateway Kafka publish errors"
            description: "The gateway failed to publish input events to Kafka — async job submissions are failing."
            runbook_url: "{{ $runbookBase }}/KeventGatewayKafkaPublishErrors"

        - alert: KeventGatewayS3Errors
          expr: sum(increase(kevent_s3_errors_total[5m])) > 0
          for: 0m
          labels:
            severity: warning
          annotations:
            summary: "Gateway S3 errors"
            description: "The gateway encountered S3 errors (upload/get/delete)."
            runbook_url: "{{ $runbookBase }}/KeventGatewayS3Errors"

        - alert: KeventGatewaySyncJobsInFlightHigh
          expr: kevent_sync_jobs_in_flight > {{ .Values.alerting.prometheusRule.thresholds.syncJobsInFlight }}
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High number of sync jobs in flight ({{ "{{" }} $value {{ "}}" }})"
            description: "More than {{ .Values.alerting.prometheusRule.thresholds.syncJobsInFlight }} sync-over-Kafka connections are open simultaneously."
            runbook_url: "{{ $runbookBase }}/KeventGatewaySyncJobsInFlightHigh"

        - alert: KeventGatewayRateLimitHighRejectionRate
          expr: |
            (
              sum by (service_type) (rate(kevent_ratelimit_requests_total{result="rejected"}[5m])) /
              sum by (service_type) (rate(kevent_ratelimit_requests_total[5m]))
            ) > {{ .Values.alerting.prometheusRule.thresholds.rateLimitRejectionRateWarning }}
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High rate-limit rejection rate on {{ "{{" }} $labels.service_type {{ "}}" }} ({{ "{{" }} $value | humanizePercentage {{ "}}" }})"
            description: "More than {{ mulf .Values.alerting.prometheusRule.thresholds.rateLimitRejectionRateWarning 100 }}% of requests are being rate-limited for service_type={{ "{{" }} $labels.service_type {{ "}}" }}. Check quota configuration or consumer activity."
            runbook_url: "{{ $runbookBase }}/KeventGatewayRateLimitHighRejectionRate"

        - alert: KeventGatewayRateLimitErrors
          expr: sum(increase(kevent_ratelimit_errors_total[5m])) > 0
          for: 0m
          labels:
            severity: warning
          annotations:
            summary: "Rate limiter Redis errors (fail-open)"
            description: "The rate limiter encountered Redis errors — requests are being allowed through (fail-open). Check Redis connectivity."
            runbook_url: "{{ $runbookBase }}/KeventGatewayRateLimitErrors"

    - name: kevent-relay
      rules:
        {{- $runbookBase := .Values.alerting.prometheusRule.runbookBaseURL }}

        - alert: KeventRelayJobFailureRate
          expr: |
            (
              sum by (service_type) (rate(kevent_relay_jobs_total{status="failed"}[5m])) /
              sum by (service_type) (rate(kevent_relay_jobs_total[5m]))
            ) > {{ .Values.alerting.prometheusRule.thresholds.relayJobFailureRateWarning }}
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High relay job failure rate on {{ "{{" }} $labels.service_type {{ "}}" }} ({{ "{{" }} $value | humanizePercentage {{ "}}" }})"
            description: "More than {{ mulf .Values.alerting.prometheusRule.thresholds.relayJobFailureRateWarning 100 }}% of relay jobs are failing for service_type={{ "{{" }} $labels.service_type {{ "}}" }}."
            runbook_url: "{{ $runbookBase }}/KeventRelayJobFailureRate"

        - alert: KeventRelayJobFailureRate
          expr: |
            (
              sum by (service_type) (rate(kevent_relay_jobs_total{status="failed"}[5m])) /
              sum by (service_type) (rate(kevent_relay_jobs_total[5m]))
            ) > {{ .Values.alerting.prometheusRule.thresholds.relayJobFailureRateCritical }}
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Critical relay job failure rate on {{ "{{" }} $labels.service_type {{ "}}" }} ({{ "{{" }} $value | humanizePercentage {{ "}}" }})"
            description: "More than {{ mulf .Values.alerting.prometheusRule.thresholds.relayJobFailureRateCritical 100 }}% of relay jobs are failing for service_type={{ "{{" }} $labels.service_type {{ "}}" }}."
            runbook_url: "{{ $runbookBase }}/KeventRelayJobFailureRate"

        - alert: KeventRelayInferenceSlow
          expr: |
            histogram_quantile(0.95,
              sum by (service_type, le) (
                rate(kevent_relay_inference_duration_seconds_bucket[10m])
              )
            ) > {{ .Values.alerting.prometheusRule.thresholds.relayInferenceP95Seconds }}
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Slow inference p95 on {{ "{{" }} $labels.service_type {{ "}}" }} ({{ "{{" }} $value | humanizeDuration {{ "}}" }})"
            description: "95th percentile inference duration exceeds {{ .Values.alerting.prometheusRule.thresholds.relayInferenceP95Seconds }}s for service_type={{ "{{" }} $labels.service_type {{ "}}" }}."
            runbook_url: "{{ $runbookBase }}/KeventRelayInferenceSlow"

        - alert: KeventRelayS3Errors
          expr: sum(increase(kevent_relay_s3_errors_total[5m])) > 0
          for: 0m
          labels:
            severity: warning
          annotations:
            summary: "Relay S3 errors"
            description: "Relay sidecars encountered S3 errors (get/put/delete) — jobs may be failing."
            runbook_url: "{{ $runbookBase }}/KeventRelayS3Errors"

        {{- with .Values.alerting.prometheusRule.extraRules }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
{{- end }}
