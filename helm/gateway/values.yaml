replicaCount: 1

image:
  repository: ghcr.io/ia-generative/kevent-ai/gateway
  tag: "v0.7.0"
  pullPolicy: IfNotPresent

imagePullSecrets: []

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: "nginx"
  annotations: {}
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  host: api.kevent.example.com
  tls: []
  #  - secretName: kevent-gateway-tls
  #    hosts:
  #      - api.kevent.example.com

# ── Configuration ────────────────────────────────────────────────────────────
config:
  # Option B : référencer une ConfigMap existante contenant config.yaml.
  # Si renseigné, le chart ne crée pas de ConfigMap et utilise celle-ci.
  # La ConfigMap doit contenir la clé "config.yaml".
  existingConfigMap: ""

# ── S3 / Scaleway Object Storage ─────────────────────────────────────────────
s3:
  endpoint: "https://s3.fr-par.scw.cloud"
  region: "fr-par"
  bucket: "test-kevent-jobs"
  # Option A : fournir les credentials directement (créé un Secret dans le cluster)
  accessKey: ""
  secretKey: ""
  # Option B : référencer un Secret existant (ex: géré par External Secrets)
  #   Le Secret doit contenir les clés S3_ACCESS_KEY et S3_SECRET_KEY.
  existingSecret: ""

# ── Kafka ─────────────────────────────────────────────────────────────────────
kafka:
  brokers: "kafka:9092"
  sasl:
    enabled: false
    mechanism: SCRAM-SHA-512
    username: kevent-gateway
    # Option A : fournir le mot de passe directement (crée un Secret dans le cluster)
    password: ""
    # Option B : référencer un Secret existant (ex: copie du secret Strimzi kevent-gateway)
    #   Le Secret doit contenir la clé KAFKA_SASL_PASSWORD.
    existingSecret: ""
    secretKey: ""
  tls:
    enabled: false
    # Secret contenant la CA du cluster Strimzi (clé : ca.crt).
    # À créer dans le namespace du gateway depuis default-cluster-ca-cert (infra-kafka).
    existingCACertSecret: "kafka-cluster-ca-cert"

# ── Chiffrement at-rest (S3) ──────────────────────────────────────────────────
# Clé AES-256-GCM partagée entre le gateway et tous les relay sidecars.
# Générer : openssl rand -hex 32
# Vide = chiffrement désactivé.
encryption:
  key: ""
  # Option B : référencer un Secret existant (ex: géré par External Secrets)
  #   Le Secret doit contenir la clé ENCRYPTION_KEY.
  existingSecret: ""

# ── Services d'inférence enregistrés ─────────────────────────────────────────
# Chaque service peut opérer en mode async (Kafka) et/ou sync (proxy OpenAI).
#
# Champs sync (optionnels) :
#   model        — valeur du champ "model" dans le payload OpenAI, utilisée pour
#                  router les requêtes POST /v1/* vers le bon backend
#   operations   — map opération → liste de chemins URL
#                  ex: transcription: ["/v1/audio/transcriptions"]
#                  Tous les chemins sont indexés pour le routage sync ;
#                  le premier est utilisé comme InferenceURL en mode async.
#   inferenceURL — URL de base du relay Knative ; le chemin de la requête
#                  d'origine y est appendé automatiquement
#
# Champs async (Kafka) — topics nommés d'après le modèle :
#   inputTopic / resultTopic / acceptedExts / maxFileSizeMB
#   En async, spécifier l'opération via le champ de formulaire "operation"
#   si le modèle en propose plusieurs.
services:
  - type: audio
    # Sync / OpenAI-compatible
    model: "whisper-large-v3"
    default: true
    operations:
      transcription:
        - "/v1/audio/transcriptions"
      translation:
        - "/v1/audio/translations"
    inferenceURL: "http://kevent-transcription-predictor.default.svc.cluster.local"
    # Async / Kafka
    inputTopic: "jobs.whisper-large-v3.input"
    resultTopic: "jobs.whisper-large-v3.results"
    # Priority topic for sync-over-Kafka: POST /v1/* multipart requests are routed
    # here instead of proxied directly. Leave empty to use direct proxy (inferenceURL).
    syncTopic: "jobs.whisper-large-v3.sync"
    acceptedExts: [".mp3", ".wav", ".m4a", ".ogg", ".flac"]
    maxFileSizeMB: 500

  - type: ocr
    # Sync / OpenAI-compatible
    model: "llava-v1.6-mistral-7b"
    operations:
      ocr:
        - "/v1/ocr"
        - "/v1/vision/ocr"
    inferenceURL: "http://kevent-ocr-predictor.default.svc.cluster.local"
    # Async / Kafka
    inputTopic: "jobs.llava-v1.6-mistral-7b.input"
    resultTopic: "jobs.llava-v1.6-mistral-7b.results"
    acceptedExts: [".pdf", ".jpg", ".jpeg", ".png", ".tiff", ".bmp"]
    maxFileSizeMB: 50

  # ── Multi-backend : blue/green, canary, fallback ─────────────────────────
  # Remplace inferenceURL par une liste backends. Mutuellement exclusif avec
  # inferenceURL (backends a la priorité si les deux sont renseignés).
  #
  # weight > 0 : éligible en sélection primaire (pondération relative).
  # weight = 0 : fallback-only (jamais sélectionné en primaire ; essayé
  #              uniquement si tous les backends weight>0 échouent).
  #
  # Blue/green  → weight: 100/0 ; promotion = swap des weights
  # Canary      → weight: 90/10
  # Fallback    → weight: 100 + weight: 0
  #
  # - type: llm
  #   model: "gpt-4o"
  #   operations:
  #     chat:
  #       - "/v1/chat/completions"
  #   backends:
  #     - url: "http://backend-v1.svc"
  #       weight: 90
  #     - url: "http://backend-v2.svc"
  #       weight: 10
  #     - url: "http://backend-fallback.svc"
  #       weight: 0    # last resort

  # Exemple de service sync-direct uniquement (sans Kafka).
  # Les requêtes POST /v1/* sont proxifiées directement vers inferenceURL.
  # POST /jobs/{service_type} retourne 405.
  # - type: reranker
  #   model: "bge-reranker-v2-m3"
  #   operations:
  #     rerank:
  #       - "/v1/rerank"
  #   inferenceURL: "http://kevent-reranker-predictor.default.svc.cluster.local"
  #   # Pas de inputTopic / resultTopic → sync-direct uniquement
  #
  #   # Headers injectés sur chaque requête vers le backend (sync-direct uniquement).
  #   # Les valeurs supportent ${VAR} (expansion depuis les variables d'environnement).
  #   # Ces headers écrasent ceux éventuellement envoyés par le client.
  #   # inferenceHeaders:
  #   #   Authorization: "Bearer ${RERANKER_API_KEY}"
  #   #   X-Api-Key: "${BACKEND_KEY}"

# ── Redis ─────────────────────────────────────────────────────────────────────
# Valeurs passées au subchart dandydeveloper/redis-ha.
# HAProxy est activé pour exposer un endpoint stable (master actif) au gateway.
redis-ha:
  enabled: true
  haproxy:
    enabled: true    # expose {{ .Release.Name }}-redis-ha-haproxy:6379
    replicas: 2
  redis:
    masterGroupName: "mymaster"
  replicas: 3

# ── Consumer token tracking ───────────────────────────────────────────────────
# Suivi de la consommation LLM par consumer (kevent_llm_consumer_tokens_top).
# Nécessite server.consumerHeader configuré. Indépendant du ServiceMonitor ci-dessous.
metricsConfig:
  # Nombre de top consumers à exposer dans Prometheus (Redis sorted set, refresh 60s).
  # 0 = désactivé. Recommandé : 20–50.
  topConsumers: 0
  # Labels Prometheus directs par consumer. Uniquement pour < 50 consumers connus.
  # Pour des consumers dynamiques, utiliser topConsumers à la place.
  consumerLabels: false

# ── Monitoring (Prometheus Operator) ─────────────────────────────────────
metrics:
  serviceMonitor:
    enabled: false
    # Namespace où créer le ServiceMonitor (défaut : même namespace que la release).
    # À renseigner si le namespace du Prometheus Operator diffère.
    namespace: ""
    interval: 30s
    scrapeTimeout: 10s
    # Labels supplémentaires à apposer sur le ServiceMonitor — utile pour que
    # le Prometheus Operator sélectionne ce monitor via son champ
    # spec.serviceMonitorSelector.matchLabels.
    # Exemple : release: kube-prometheus-stack
    additionalLabels: {}
    relabelings: []
    metricRelabelings: []

# ── Alerting (Prometheus Operator) ───────────────────────────────────────────
alerting:
  prometheusRule:
    enabled: false
    # Namespace où créer la PrometheusRule (défaut : même namespace que la release).
    namespace: ""
    # Labels supplémentaires — doit correspondre au ruleSelector du Prometheus Operator.
    # Exemple : release: kube-prometheus-stack
    additionalLabels: {}
    # URL de base des runbooks. Les URLs finales seront <runbookBaseURL>/<AlertName>.
    runbookBaseURL: "https://ia-generative.github.io/kevent-ai/runbooks"
    # Seuils modifiables par alerte.
    thresholds:
      # Taux d'erreur gateway (0.05 = 5%)
      gatewayErrorRateWarning: 0.05
      gatewayErrorRateCritical: 0.20
      # Nombre de jobs sync en vol simultanés avant alerte
      syncJobsInFlight: 20
      # Taux d'échec relay (0.10 = 10%)
      relayJobFailureRateWarning: 0.10
      relayJobFailureRateCritical: 0.30
      # Durée d'inférence p95 en secondes avant alerte slow
      relayInferenceP95Seconds: 120
      # Taux de rejet rate limit (0.20 = 20% des requêtes rejetées sur un service)
      rateLimitRejectionRateWarning: 0.20
    # Règles supplémentaires ajoutées au groupe kevent-relay.
    extraRules: []
    # Exemple :
    # extraRules:
    #   - alert: MyCustomAlert
    #     expr: kevent_relay_deferred_total > 100
    #     for: 5m
    #     labels:
    #       severity: warning
    #     annotations:
    #       summary: "Too many deferred async jobs"

# ── Ressources / scheduling ───────────────────────────────────────────────────
resources: {}
  # limits:
  #   cpu: 500m
  #   memory: 256Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

nodeSelector: {}
tolerations: []
affinity: {}

# ── Variables d'environnement supplémentaires ─────────────────────────────────
# Injectées telles quelles dans le container gateway, après les variables gérées
# par le chart. Accepte toute syntaxe Kubernetes (value, valueFrom, secretKeyRef…).
# Exemple pour un token GitHub stocké dans un Secret :
#
# extraEnvVars:
#   - name: GITHUB_TOKEN
#     valueFrom:
#       secretKeyRef:
#         name: github-token
#         key: token
extraEnvVars: []

# ── Config hot-reload sidecar ─────────────────────────────────────────────────
# Watches the ConfigMap volume and POSTs /-/reload when the config file changes.
configReloader:
  enabled: false
  image: "ghcr.io/jimmidyson/configmap-reload:v0.14.0"
  # Port exposed by the configmap-reload metrics/web server.
  listenPort: 9533
