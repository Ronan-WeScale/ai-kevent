server:
  addr: ":8080"
  read_timeout: 120s   # large for file uploads
  # write_timeout: 0 — sync proxy can run for several minutes; timeout is
  # enforced by Knative timeoutSeconds on the InferenceService side.
  write_timeout: 0s
  idle_timeout: 120s
  # priority_header: HTTP header set by APISIX on SA consumer requests.
  # When present and the service has a priority_topic, the job is routed
  # to that topic and processed with elevated priority by the relay.
  # Leave empty to disable priority routing.
  priority_header: "${PRIORITY_HEADER:-}"
  # consumer_header: HTTP header injected by APISIX after authentication to
  # identify the API consumer (e.g. "X-Consumer-Username").
  # When set:
  #   - consumer name is stored in the job record and indexed in Redis
  #   - GET /jobs returns the consumer's job list
  #   - GET /jobs/{type}/{id} enforces ownership (404 on mismatch)
  #   - kevent_jobs_by_consumer_total metric is emitted per consumer
  # Leave empty in deployments without upstream authentication.
  consumer_header: "${CONSUMER_HEADER:-}"
  # user_type_header: HTTP header injected by OPA to identify the user type for
  # rate limiting (e.g. "X-User-Type"). Values are matched against rate_limits
  # entries; "*" is the fallback when the header is absent or unlisted.
  # Leave empty to apply only the "*" fallback (no per-type differentiation).
  user_type_header: "${USER_TYPE_HEADER:-}"

kafka:
  brokers:
    - "${KAFKA_BROKERS:-kafka:9092}"
  consumer_group: "kevent-gateway"

s3:
  # Standard S3-compatible object storage — configured here for Scaleway.
  # Endpoint format (Scaleway): https://s3.<region>.scw.cloud
  # Available regions:          fr-par | nl-ams | pl-waw
  endpoint: "${S3_ENDPOINT:-https://s3.fr-par.scw.cloud}"
  region: "${S3_REGION:-fr-par}"
  access_key: "${S3_ACCESS_KEY}"    # Scaleway API Access Key ID
  secret_key: "${S3_SECRET_KEY}"    # Scaleway API Secret Key
  bucket: "${S3_BUCKET:-kevent-jobs}"

encryption:
  # AES-256-GCM at-rest encryption for S3 objects.
  # Generate with: openssl rand -hex 32
  # Must be identical on all gateway and relay instances.
  # Empty = encryption disabled (default).
  key: "${ENCRYPTION_KEY:-}"

redis:
  addr: "${REDIS_ADDR:-redis:6379}"
  password: "${REDIS_PASSWORD:-}"
  db: 0
  job_ttl_hours: 72  # keep job records for 3 days

# ─────────────────────────────────────────────────────────────────────────────
# Metrics — consumer tracking
# Ces options activent un suivi fin de la consommation LLM par consumer.
# Les deux mécanismes sont indépendants et peuvent être activés simultanément.
# ─────────────────────────────────────────────────────────────────────────────
metrics:
  # top_consumers: expose les N meilleurs consommateurs LLM dans Prometheus via
  # kevent_llm_consumer_tokens_top{consumer, user_type, type="prompt|completion"}.
  # Stocké dans un sorted set Redis (ZINCRBY), rafraîchi toutes les 60s.
  # Nécessite que server.consumer_header soit configuré.
  # 0 = désactivé (défaut).
  top_consumers: ${METRICS_TOP_CONSUMERS:-0}
  # consumer_labels: émet des labels Prometheus directs par consumer
  # (kevent_llm_tokens_total{consumer=...}).
  # Réservé aux déploiements avec un nombre borné de consumers (< 50).
  # Pour des deployments avec des consumers dynamiques, préférer top_consumers.
  # false = désactivé (défaut).
  consumer_labels: false

# ─────────────────────────────────────────────────────────────────────────────
# Service registry
# To add a new inference service: append a block below. No code change needed.
#
# Sync mode (OpenAI-compatible endpoints):
#   model:         value of the "model" field in the OpenAI payload
#   operations:    map of operation name → list of URL paths
#                  all paths are indexed for sync routing; the first is used for async
#   inference_url: base URL of the backend — original request path is appended at runtime
#
# Async mode (Kafka):
#   input_topic / result_topic / accepted_exts / max_file_size_mb
#   operation:     (form field) optional operation name for async submission
#                  required when the model has multiple operations
# ─────────────────────────────────────────────────────────────────────────────
services:
  - type: audio
    # Sync / OpenAI-compatible
    model: "whisper-large-v3"
    default: true  # used when no model is specified and multiple models are configured
    operations:
      transcription:
        - "/v1/audio/transcriptions"
      translation:
        - "/v1/audio/translations"
    inference_url: "${TRANSCRIPTION_WHISPER_LARGE_V3_URL:-http://kevent-transcription-predictor.default.svc.cluster.local}"
    # Async / Kafka — topics named after the model
    input_topic: jobs.whisper-large-v3.input
    result_topic: jobs.whisper-large-v3.results
    # Sync-over-Kafka: priority topic consumed by a dedicated KafkaSource → /sync
    # Leave empty to fall back to direct proxy (inference_url).
    sync_topic: jobs.whisper-large-v3.sync
    # Priority async: SA accounts are routed here when server.priority_header is set.
    # A dedicated KafkaSource routes this topic to POST /sync on the relay so normal
    # async jobs are deferred for its duration. Leave empty to disable.
    priority_topic: jobs.whisper-large-v3.input.priority
    accepted_exts: [".mp3", ".wav", ".m4a", ".ogg", ".flac"]
    max_file_size_mb: 500

  # ── Example: add a second model variant for the same service type ──────────
  # - type: audio
  #   model: "whisper-large-v3-turbo"
  #   ...
  # Both models share the same rate_limits["audio"] counter per consumer.

  - type: ocr
    # Sync / OpenAI-compatible
    model: "llava-v1.6-mistral-7b"
    operations:
      ocr:
        - "/v1/ocr"
        - "/v1/vision/ocr"
    inference_url: "${OCR_LLAVA_URL:-http://kevent-ocr-predictor.default.svc.cluster.local}"
    # Async / Kafka — topics named after the model
    input_topic: jobs.llava-v1.6-mistral-7b.input
    result_topic: jobs.llava-v1.6-mistral-7b.results
    accepted_exts: [".pdf", ".jpg", ".jpeg", ".png", ".tiff", ".bmp"]
    max_file_size_mb: 50

  # ── Example: add a new model variant for the same service type ─────────────
  # - type: audio
  #   model: "whisper-large-v3-turbo"
  #   operations:
  #     transcription:
  #       - "/v1/audio/transcriptions"
  #     translation:
  #       - "/v1/audio/translations"
  #   inference_url: "http://kevent-transcription-turbo-predictor.default.svc.cluster.local"
  #   input_topic: jobs.whisper-large-v3-turbo.input
  #   result_topic: jobs.whisper-large-v3-turbo.results
  #   accepted_exts: [".mp3", ".wav", ".m4a", ".ogg", ".flac"]
  #   max_file_size_mb: 500

  # ── Example: LLM proxy services (provider + optional response cache) ────────
  #
  # OpenAI passthrough — proxy to api.openai.com, cache responses for 1 hour.
  # - type: llm
  #   model: "gpt-4o"
  #   default: true
  #   provider: openai
  #   response_cache_ttl: 3600        # seconds; 0 = disabled
  #   operations:
  #     chat:
  #       - "/v1/chat/completions"
  #   inference_url: ""               # empty = defaults to https://api.openai.com
  #   inference_headers:
  #     Authorization: "Bearer ${OPENAI_API_KEY}"
  #
  # Anthropic — translate OpenAI-format requests to the Messages API automatically.
  # - type: llm
  #   model: "claude-3-5-sonnet-20241022"
  #   provider: anthropic
  #   response_cache_ttl: 3600
  #   operations:
  #     chat:
  #       - "/v1/chat/completions"
  #   inference_url: ""               # empty = defaults to https://api.anthropic.com
  #   inference_headers:
  #     x-api-key: "${ANTHROPIC_API_KEY}"
  #
  # Ollama — OpenAI-compatible local model, no translation needed.
  # - type: llm
  #   model: "llama3.2"
  #   provider: ollama
  #   response_cache_ttl: 0           # disable caching for local models
  #   operations:
  #     chat:
  #       - "/v1/chat/completions"
  #   inference_url: "http://ollama.default.svc.cluster.local:11434"
  #
  # Passthrough — forward verbatim with server-side headers injected.
  # - type: llm
  #   model: "mixtral-8x7b"
  #   provider: passthrough
  #   response_cache_ttl: 1800
  #   operations:
  #     chat:
  #       - "/v1/chat/completions"
  #   inference_url: "http://vllm.default.svc.cluster.local:8000"
  #   inference_headers:
  #     Authorization: "Bearer ${VLLM_TOKEN}"

# ─────────────────────────────────────────────────────────────────────────────
# Rate limiting
# Per-consumer, per-service-type limits keyed by user type (server.user_type_header).
# Applies to both async (POST /jobs/{type}) and sync (POST /v1/*) endpoints.
# "*" is the fallback when the header is absent or the type has no specific entry.
# Multiple models for the same service type share the same counter.
# Leave this section empty (or omit it) to disable rate limiting.
# ─────────────────────────────────────────────────────────────────────────────
# rate_limits:
#   audio:
#     premium:
#       rate: 100
#       period: 1m
#     standard:
#       rate: 20
#       period: 1m
#     "*":
#       rate: 10
#       period: 1m
#   ocr:
#     "*":
#       rate: 5
#       period: 1m
